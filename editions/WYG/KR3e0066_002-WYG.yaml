body:
  text: 醫經㴑洄集卷下元王履撰傷寒四逆厥辯成無已註傷寒論有云四逆者四肢不温也厥者手足冷也傷寒邪在三陽則手足必熱𫝊到太隂手足自温至少隂則邪熱漸深故四肢逆而不温及至厥隂則手足厥冷是又甚於逆經曰少隂病四逆其人或欬或悸或小便不利或腹中痛或泄痢下重者四逆散主之方用柴胡枳實芍藥甘草四者皆寒冷之物而専主四逆之疾是知四逆非虛寒之證也四逆與厥相近而非經曰諸四逆厥者不可下是四逆與厥有異也吁斯言也所謂彌近理而大亂真者歟竊嘗考之仲景言四逆與厥者非一或曰四逆或曰厥或曰厥逆或曰厥冷或曰厥寒或曰手足逆冷或曰手足厥逆或曰手足厥冷或曰手足厥逆冷細詳其義俱是言寒冷耳故厥逆二字毎毎互言未嘗分逆為不温厥為冷也然四肢與手足却有所分其以四字加於逆字之上者是通指手足臂脛以上言也其以手足二字加於厥逆厥冷等之上及無手足二字者是獨指手足言也既曰不温即為冷矣尚何異乎仲景所謂諸四逆厥者不可下盖以四逆為四肢通冷厥為手足獨冷而臂與脛以上不冷耳不謂逆厥有不温與冷之别也故又曰厥者手足逆冷是也以逆冷二字釋厥字足見逆即厥厥即逆也故字書曰厥者逆也雖然逆厥雖俱為寒冷而却有隂陽之殊焉熱極而成逆厥者陽極似隂也寒極而成逆厥者獨隂無陽也陽極似隂故用寒藥獨隂無陽故用熱藥仲景以四逆散寒藥治四逆一條此陽極似隂之四逆也其無四逆湯熱藥治四逆之條者安知其非本有而失之乎且四逆湯之名由四逆之冷而立也今以四逆湯治手足厥冷豈非逆厥之不異乎既以四逆為四肢不温厥為手足獨冷何故不名治厥之藥為四厥湯乎成氏於四逆散治四逆條下謂四逆為熱邪所為及於明理論謂四逆非虛寒之證矣至於少隂病死證二條下却謂四逆為寒甚若此者得不自悖其説乎是知四逆亦猶厥之有寒有熱固不可謂四逆專為熱邪所作也但四肢通冷比之手足通冷則有間耳故仲景曰少隂病吐利躁煩四逆者死又曰少隂病四逆惡寒而身倦脈不至不煩而躁者死又曰少隂病吐利手足厥冷煩躁欲死者呉茱萸湯主之此三條者二為死一為可治雖通由諸證兼見而然然死者以四逆言可治者以厥冷言則亦可見四逆與手足厥冷之有輕重淺深矣夫四肢通冷其病為重手足獨冷其病為輕雖婦人小子亦能知之成氏乃謂厥甚於逆何耶若能知四逆厥之所以異者在於獨指手足言與兼指臂脛以上言則不勞創為不温與冷之曲説而自然貫通矣嘔吐乾嘔噦欬逆辨嘗讀成無已傷寒明理論有曰嘔者有聲者也俗謂之啘吐者吐出其物也故有乾嘔而無乾吐是以於嘔則曰食穀欲嘔及吐則曰飲食入口即吐則嘔吐之有輕重可知矣又曰噦者俗謂之欬逆是也余竊疑之於是即仲景傷寒論以考其是非以訂其説夫傷寒論曰嘔曰吐曰乾嘔曰噦者至多曰欬逆者則二而止也因類聚而觀之夫嘔者東垣所謂聲物兼出者也吐者東垣所謂物出而無聲者也至若乾嘔與噦皆聲出而無物也東垣但以噦該之而無乾嘔之論夫乾嘔與噦其所異者果何在哉微甚而已矣故仲景於乾嘔則皆平易言之於噦則曰太陽中風火刼發汗後乆則譫語甚者至噦又曰陽明中風若不尿腹滿加噦者不治又曰大吐大下之極虛復極汗出者因得噦雖亦間有似平易言者然比之言乾嘔則徑庭矣竊又思之乾嘔與噦東垣視為一仲景視為二由為一而觀之固皆聲之獨出者也由為二而觀之則乾嘔乃噦之微噦乃乾嘔之甚乾嘔者其聲輕小而短噦者其聲重大而長長者雖有㣲甚之分盖一證也今成氏乃以嘔為有聲與乾嘔混而無别又以噦為欬逆若此者余未之能從也夫仲景以聲物兼出而名為嘔以物獨出而名為吐以聲獨出而名為乾嘔惟其嘔兼聲物故無物而聲空鳴者乃謂之乾乾猶空也至於吐則是必有物矣其可謂之乾乎仲景於嘔字上加一乾字所以别夫嘔為聲物兼出者耳成氏乃以嘔為獨有聲而同乎乾嘔得不有失仲景措辭之本意歟仲景曰嘔家有癰膿者不可治嘔盡膿自愈夫謂之嘔盡膿其可以嘔為獨有聲乎至於曰得湯則嘔得食而嘔飲水嘔貪水者必嘔之類亦不可以嘔為獨有聲矣又少隂病下利用通脈四逆湯一條其所叙諸證既有乾嘔之文何下文加减法中又曰嘔者加生薑乎設仲景果以嘔為獨有聲則不當又立乾嘔之名矣觀其既曰嘔又曰乾嘔則其義之殊别也詎不著明也哉且仲景嘗言欲嘔矣又言欲吐矣未嘗言欲乾嘔欲噦也夫欲之為義將出未出而預有所覺之辭也夫將出未出而預覺者惟有形之物則然無形之聲則不然也有形之物皆出乎胸膈之間則雖未出而亦可以前知若無形之聲則不能前知其將出必待夫既出而後可知也嘔與吐主有形之物言故可謂之欲乾嘔與噦主無形之聲言故不可謂之欲成氏引食穀欲嘔飲食入口即吐二句而謂嘔吐有輕重其意盖以嘔言欲而輕吐言即而為重安知言欲不言欲者本為有形無形設不為輕重設也果如其説則得湯則嘔得食而嘔心中温温欲吐氣逆欲吐之語不出於仲景乎又引俗謂之啘一句以證嘔夫啘與噦盖字異而音義俱同者也以之證嘔亦疏矣雖然以嘔與吐較之吐輕於嘔以吐與乾嘔較之乾嘔輕於吐然三者亦各自有輕重不可定拘也但以嘔吐乾嘔與噦而較則噦之為重必非三者之比矣故太素曰木陳者其葉落病深者其聲噦夫噦雖亦有輕而可治重而不可治者然病至於噦則其治也終不易矣且夫欬逆俗以吃逆與吃忒呼之然欬逆二字僅見傷寒論首辨脈平脈法中其六經病篇及汗下可否諸篇皆無所有其所有者噦也後人因見六經病篇及汗下可否諸篇但有噦而無欬逆遂謂噦即欬逆而曰欬逆者噦逆之名吁斯言也孫真人倡於前朱奉議成無已和於後由是噦與欬逆之名義紊矣金匱要畧曰病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之乾嘔噦手足厥者橘皮湯主之噦逆者橘皮竹茹湯主之觀此則仲景所謂噦逆但指與乾嘔同類者言何嘗指欬逆言乎欬逆噦逆不同欬逆言其聲之􅂊發而遽止雖發止相續有至數十聲者然而短促不長有若欬嗽之欬然故曰欬逆噦逆則言其似欲嘔物以出而無所出但聲之濁惡長而有力直至氣盡而後止非如乾嘔之輕而不甚故曰噦逆二者皆由氣之逆上而作故俱以逆言之孫真人乃以噦逆當欬逆何耶彼言傷寒者雖以辨脈平脈法之欬逆與欬逆上氣視為吃忒然安知其不為欬而氣逆之病乎故今不敢定其必為吃忒也金匱要畧曰病欬逆寸口脈㣲而數此為肺癰欬逆上氣時時唾濁但坐不得眠皂角丸主之欬而上氣喉中水雞聲射干麻黄湯主之此二條者皆是欬而氣逆之病豈可以欬逆專為吃忒哉今傷寒家本有吃忒而論中六經病篇及汗下可否諸篇却無者必亡逸於散落之餘耳雖吃忒為六經病篇及汗下可否諸篇所不言決不可以噦為吃忒之欬逆亦不可以噦為欬而氣逆之欬逆也或曰吾子以要略所謂噦逆非吃忒病何後人治吃忒者用橘皮竹茹湯而愈乎余曰橘皮竹茹湯辛甘之劑也有散有緩有和有補其噦逆吃忒病雖不同而為邪正之氣怫鬰擾亂所致則一故用焉而皆愈雖然噦逆吃忒以一藥同治則可以一體同視則不可中風辨人有卒暴僵仆或偏枯或四肢不舉或不知人或死或不死者世以中風呼之而方書亦以中風治之余嘗考諸内經則曰風者百病之始也又曰風者百病之長也至其變化乃為他病無常方又曰風者善行而數變又曰風之傷人也或為寒熱或為熱中或為寒中或為癘風或為偏枯或為風也其卒暴僵仆不知人四肢不舉者並無所論止有偏枯一語而已及觀千金方則引岐曰中風大法有四一曰偏枯二曰風痱三曰風懿四曰風痺解之者偏枯者半身不隨風痱者身無痛四肢不収風懿者奄忽不知人風痺者諸痺類風狀金匱要略中風篇曰寸口脈浮而𦂳𦂳則為寒浮則為虚寒虚相搏邪在皮膚浮者血虛絡脈空虚賊邪不瀉或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即克不勝邪入於腑即不識人邪入於臟舌即難言口吐涎沫由是觀之知卒暴僵仆不知人偏枯四肢不舉等証固為因風而致者矣故用大小續命西州續命排風八風等諸湯散治之及近代劉河間李東垣朱彦脩三子者出所論始與昔人異矣河間曰中風癱瘓者非謂肝木之風實甚而卒中之亦非外中於風由乎將息失宜心火暴甚腎水虛衰不能制之則隂虚陽實而熱氣怫鬰心神昏冐筋骨不用而卒倒無所知也多因喜怒思悲恐五志有所過極而卒中者由五志過極皆為熱甚故也俗云風者言末而忘其本也東垣曰中風者非外來風邪乃本氣病也凡人年逾四旬氣衰之際或因憂喜忿怒傷其氣者多有此疾壯嵗之時無有也若肥盛則間有之亦是形盛氣衰而如此彦脩曰西北氣寒為風所中誠有之矣東南氣温而地多濕有風病者非風也皆濕土生痰痰生熱熱生風也三子之論河間主乎火東垣主乎氣彦脩主乎濕反以風為虚象而大異於昔人矣吁昔人也三子也果孰是歟果孰非歟以三子為是昔人為非則三子未出之前固有從昔人而治愈者矣以昔人為是三子為非則三子已出之後亦有從三子而治愈者矣故不善讀其書者往往致亂以予觀之昔人三子之論皆不可偏廢但三子以相類中風之病視為中風而立論故使後人狐疑而不能決殊不知因於風者真中風也因於火因於氣因於濕者類中風而非中風也三子所論者自是因火因氣因濕而為暴病暴死之證與風何相干哉如内經所謂三隂三陽發病為偏枯痿易四肢不舉亦未嘗必因於風而後能也夫風火氣濕之殊望聞問切之間豈無所辨乎辨之為風則從昔人以治辨之為火氣濕則從三子以治如此庶乎析理明而用法當矣惟其以因火因氣因濕之證強引風而合論之所以真偽不分而名實相紊若以因火因氣因濕證分出之則真中風病彰矣所謂西北有中風東南無中風者其然歟否歟中暑中熱辨潔古云靜而得之為中暑動而得之為中熱中暑者隂證中熱者陽證東垣云避暑熱於深堂大厦得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室之隂寒所遏使周身陽氣不得伸越大順散主之若行人或農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渇引飲汗大泄無氣以動乃為天熱外傷肺氣蒼术白虎湯主之竊謂暑熱者夏之令也大行於天地之間人或勞動或饑餓元氣虧乏不足以禦天令亢極於是受傷而為病名曰中暑亦名曰中熱其實一也今乃以動靜所得分之何哉夫中暑熱者固多在於勞役之人勞役則虚虚則邪入邪入則病不虚則天令雖亢亦無由以傷之彼避暑於深堂大厦得頭痛惡寒等證者盖亦傷寒之類耳不可以中暑名之其所以煩心與肌膚火熱者非暑邪也身中陽氣受隂寒所遏而作也既非暑邪其可以中暑名乎茍欲治之則辛温輕揚之劑發散可也夫大順散一方甘草最多乾薑杏仁肉桂次之除肉桂外其三物皆炒者原其初意本為冐暑伏熱引飲過多脾胃受濕嘔吐水穀不分臟腑不調所立故甘草乾薑皆經火炒熟又肉桂而非桂枝盖温中藥也内有杏仁不過取其能下氣耳若以此藥治靜而得之之證吾恐不能觧表反增内煩矣今世俗往往不明類曰夏月隂氣在内大順散為必用之藥吁其誤也不亦甚歟夫隂氣非寒氣也盖夏月陽氣發散於外而隂氣則在内耳豈空視隂氣為寒氣而用温熱之藥乎隂果為寒何以夏則飲水乎其蒼术白虎湯雖宜用然亦豈可視為通行之藥必參之治暑諸方隨所見之證而用之然後合理若夫所謂靜而得之之證雖當暑月即非暑病宜分出之勿使後人有似同而異之惑積熱沈寒論人之所藉以生者氣也氣者何隂陽是也夫隂與陽可以和而平可以乖而否善攝與否吉凶於是乎岐之夫惟攝之不能以皆善也故偏寒偏熱之病始莫逃於乖否之餘矣雖然寒也熱也茍未至於甚粗工為之而不難設熱積而寒沈良工猶弗能以為計況其下乎奈之何俗尚顓䝉恪持方藥愈投愈盛迷之不反豈知端本澄源中含至理執其樞要衆妙俱呈且以積熱言之始而涼和次而寒取寒取不愈則因熱而從之從之不愈則技窮矣由是苦寒頻嵗而弗停又以沈寒言之始而温和次而熱取熱取不愈則因寒而從之從之不愈則技窮矣由是辛熱比年而勿止嗟夫苦寒益深而積熱彌熾辛熱太過而沈寒愈滋茍非大聖慈仁明垂樞要生也孰從而全之經曰謂寒之而熱者取之隂熱之而寒者取之陽所謂求其屬也屬也者其樞要之所存乎斯㫖也王太僕知之故曰益火之原以消隂翳壯水之主以制陽光又曰取心者不必齊以熱取腎者不必齊以寒但益心之陽寒亦通行強腎之隂熱之猶可吁混乎千言萬語之間殆猶和璧之在璞也其至乆湮豈過焉者石之而弗鑒乎余僣得而推衍之夫偏寒偏熱之病其免者固千百之一二而積熱沈寒亦恐未至於數見也然而數見者得非粗工不知求屬之道不能防㣲杜漸遂至滋曼難圖以成之歟夫寒之而熱者徒知以寒治熱而不知熱之不衰者由乎真水之不足也熱之而寒者徒知以熱治寒而不知寒之不衰者由乎真火之不足也不知真水火不足汛以寒熱藥治之非惟臟腑習熟藥反見化於其病而有者弗去無者復至矣故取之隂所以益腎水之不足而使其制夫心火之有餘取之陽所以益心火之不足而使其勝夫腎水之有餘也其指水火也屬猶主也謂心腎也求其屬者言水火不足而求之於心腎也火之原者陽氣之根即心是也水之主者隂氣之根即腎是也非謂火為心而原為肝水為腎而主為肺也寒亦益心熱亦強腎此太僕達至理於規矩凖繩之外而非迂士曲生之可以企及矣彼迂士曲生不明真水火於寒熱之病有必制必勝之道但謂藥未勝病乆逺期之是以恪守方藥愈投愈盛卒至殞滅而莫之悟嗚呼悲夫余見積熱沈寒之治毎蹈於覆轍也因表而出之以勸瀉南方補北方論難經七十五篇曰經言東方實西方虚瀉南方補北方何謂也曰金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方者肝也則知肝實西方者肺也則知肺虚瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虚故瀉火補水欲令金不得平木也經曰不能治其虚何問其餘此之謂也余毎讀至此未嘗不歎夫越人之得經㫖也而悼夫後人之失經㫖也先哲有言凡讀書不可先㸔註解且將經文反覆而詳味之待自家有新意却以註解叅校庶乎經意昭然而不為他説所蔽若先㸔註解則被其説横吾胸中自家竟無新意矣余平生佩服此訓所益甚多且如難經此篇其言周備純正足以為萬世法後人紛紛之論其可憑乎夫實則瀉之虚則補之此常道也實則瀉其子虛則補其母亦常道也人皆知之今肝實肺虚乃不瀉肝而瀉心此則人亦知之至於不補肺補脾而補腎此則人不能知惟越人知之耳夫子能令母實母能令子虚以常情觀之則曰心火實致肝木亦實此子能令母實也脾土虚致肺金亦虚此母能令子虚也心火實固由自旺脾土虚乃由肝木制之法當瀉心補脾則肝肺皆平矣越人則不然其子能令母實子謂火母謂木固與常情無異其母能令子虛母謂水子謂木則與常情不同矣故曰水者木之母也子能令母實一句言病因也母能令子虚一句言治法其意盖曰火為木之子子助其母使之過分而為病矣今將何以處之惟有補水瀉火之治而已夫補水者何謂也盖水為木之母若補水之虚使力可勝火火勢退而木勢亦退此則母能虚子之義所謂不治之治也此虚字與精氣奪則虚之虚不同彼虚謂耗其真而致虚此虚謂抑其過而欲虚之也若曰不然則母能令子虚一句將歸之於脾肺乎既歸於脾肺今何不補脾乎夫五行之道其所畏者畏所克耳今火大旺水大虧火何畏乎惟其無畏火愈旺而莫能制茍非滋水以求勝之孰能勝也水勝火三字此越人寓意處當細觀之勿輕忽也雖瀉火補水並言然其要又在於補水耳後人乃曰獨瀉火而不用補水又曰瀉火即是補水得不大違越人與經之意乎若果不用補水經必不言補北方越人必不言補水矣雖然水不虚火獨暴旺者固不必補水亦可也若先因水虛而致火旺者不補水可乎水虚火旺而不補水則藥至而暫息藥過而復作將積年累月無有窮已安能絶其根哉雖苦寒之藥通為抑陽扶隂不過瀉火邪而已終非腎臟本藥不能以滋飬北方之真隂也欲滋真隂捨地黄黄蘖之屬不可也且夫肝之實也其因有二心助肝肝實之一因也肺不能制肝肝實之二因也肺之虚也其因亦有二心剋肺肺虚之一因也脾受肝剋而不能生肺肺虚之二因也今補水而瀉火火退則木氣削又金不受剋而制木東方不實矣金氣得平又土不受剋而生金西方不虛矣若以虛則補母言之肺虛則當補脾豈知肝勢正盛克土之深雖每日補脾安能敵其正盛之勢哉縱使土能生金金受火尅亦所得不償所失矣此所以不補土而補水也或疑木旺補水恐水生木而木愈旺故聞獨瀉火不補水之論欣然而從之殊不知木已旺矣何待生乎况水之虛雖峻補而不能復其本氣安有餘力生木哉若能生木則能勝火矣或又謂補水者欲其不食於母也不食於母則金氣還矣豈知火尅金土不生金金之虛已極尚不能自給水雖欲食之何所食乎若如此則金虚不由於火之尅土之不生而由於水之食耳豈理也哉縱水不食金金亦未必能復常也金不得平木一句多一不字所以瀉火補水者正欲使金得平木也不字當刪去不能治其虛何問其餘虚指肺虚而言也瀉火補水使金自平此法之巧而妙者茍不能曉此法而不能治此虛則不須問其他必是無能之人矣故曰不能治其虛何問其餘若夫上文所謂金木水火土更相平之義不勞解而自明兹故不具也夫越人亞聖也論至於此敢不歛袵但恨説者之斁蝕之故辨五鬰論治五鬰之法嘗聞之王太僕矣其釋内經曰木鬰達之謂吐之令其條達也火鬰發之謂汗之令其疏散也土鬰奪之謂下之令無壅礙也金鬰泄之謂小渗泄解表利便也水鬰折之謂抑之制其衝逆也自太僕此説之後靡不宗之然愚則未能快然於中焉嘗細觀之似猶有可言者且折之一句較之上四句尤為難曉因反覆經文以求其至按内經帝曰鬱之甚者治之奈何岐伯曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之然調其氣過者折之以其畏也所謂瀉之總十三句通為一章當分三節言帝曰止水鬱折之九句為一節治鬱法之問荅也然調其氣一句為一節治鬱之餘法也過者折之以其畏也所謂瀉之三句為一節調氣之餘法也夫五法者經雖為病由五運之鬱所致而立然擴而充之則未嘗不可也且凡病之起也多由乎鬱鬱者滯而不通之義或因所乘而為鬱或不因所乘而本氣自鬱皆鬱也豈惟五運之變能使然哉鬱既非五運之變可拘則達之發之奪之泄之折之之法固可擴焉而充之矣可擴而充其應變不窮之理也歟姑陳於左木鬱達之達者通暢之也如肝性急怒氣逆胠脇或脹火時土炎治以苦寒辛散而不愈者則用升發之藥加以厥隂報使而從治之又如乆風入中為飱泄則以輕揚之劑舉而散之凡此之類皆達之之法也王氏謂吐之令其條達為木鬱達之東垣謂食塞胸中食為坤土胸為金位金主殺伐與坤土俱在於上而旺於天金能尅木故肝木生發之氣伏於地下非木鬱而何吐去上焦隂土之物木得舒暢則鬱結去矣此木鬱達之竊意王氏以吐訓達此不能使人無疑者以為肺金盛而抑制肝木歟則瀉肺氣舉肝氣可矣不必吐矣以為脾胃濁氣下流而少陽清氣不升歟則益胃升陽可矣不必吐也雖然木鬱固有吐之之理今以吐字總該達字則是凡木鬱皆當用吐矣其可乎哉至於東垣所謂食塞肺分為金與土旺於上而尅木又不能使人無疑者夫金之尅木五行之常道耳固不待夫物傷而後能也且為物所傷豈有反旺之理若曰吐去其物以伸木氣乃是反為木鬱而施治非為食傷而施治矣夫食塞胸中而用吐正内經所謂其高者因而越之之義耳恐不勞引木鬱之説以汨之也火鬱發之發者汗之也升舉之也如腠理外閉邪熱怫鬱則解表取汗以散之又如龍火鬱甚於内非苦寒降沈之劑可治則用升浮之藥佐以甘温順其性而從治之使勢窮則止如東垣升陽散火湯是也凡此之類皆發之之法也土鬱奪之奪者攻下也刼而衰之也如邪熱入胃同鹹寒之劑以攻去之又如中滿腹脹濕熱内甚其人壯氣實者則攻下之其或勢盛而不能頓除者則刼奪其勢而使之衰又如濕熱為痢有非力輕之劑可治者則或攻或刼以致其平凡此之類皆奪之之法也金鬱泄之泄者滲泄而利小便也疏通其氣也如肺金為腎水上原金受火爍其令不行原鬱而滲道閉矣宜肅清金化滋以利之又如肺氣膹滿胸憑仰息非利肺氣之劑不足以疏通之凡此之類皆泄之之法也王氏謂滲泄解表利小便為金鬱泄之夫滲泄利小便固為泄金鬱矣其解表二字莫曉其意得非以人之皮毛屬肺其受邪為金鬱而解表為泄之乎竊謂如此則凡筋病便是木鬱肉病便是土鬱耶此二字未當於理今刪去且解表間於滲泄利小便之中是滲漏利小便為二治矣若以滲泄為滋肺生水以利小便為直治膀胱既責不在肺何為金鬱乎是亦不通故余易之曰滲泄而利小便也水鬱折之折者制禦也伐而挫之也漸殺其勢也如腫脹之病水氣淫溢而滲道以塞夫水之所不勝者土也今土氣衰弱不能制之故凡受其侮治當實其脾土資其運化俾可以制水而不敢犯則滲道達而後愈或病勢既旺非上法所能遽制則用泄水之藥以伐而挫之或去菀陳莝開鬼門潔浄府三治備舉迭用以漸平之王氏所謂抑之制其衝逆正欲折挫其汎濫之勢也夫實土者守也泄水者攻也兼三治者廣略而決勝也守也攻也廣略也雖俱為治水之法然不審病者之虛實乆近淺深雜焉而妄施治之其不傾踣者寡矣且夫五鬱之病固有法以治之矣然邪氣乆客正氣必損今邪氣雖去正氣豈能遽平哉茍不平調正氣使各安其位復其常於治鬱之餘則猶未足以盡治法之妙故又曰宜調其氣茍調之而其氣猶或過而未服則當益其所不勝以制之如木過當益金金能制木則木斯服矣所不勝者所畏者也故曰過者折之以其畏也夫制物者物之所欲也制於物者物之所不欲也順其欲則喜逆其欲則惡今逆之以所惡故曰所謂瀉之王氏以鹹瀉腎酸瀉肝之類為説未盡厥㫖雖然自調其氣以下盖經之本㫖故余推其義如此若擴充為應變之用則不必盡然也二陽病論經曰二陽之病發心脾有不利隱曲女子不月釋之者謂男子則脾受之而味不化故少精女子則心受之而血不流故不月分心脾為男女各受立説竊獨謂不然夫二陽陽明也胃與大腸之脈也腸胃有病心脾受之發心脾猶言延及於心脾也雖然脾胃為合胃病而及脾理固宜矣大腸與心本非合也今大腸而忣心何哉盖胃為受納之府大腸為傳化之府食入於胃濁氣歸心飲入於胃輸精於脾者以胃之能納大腸之能化耳腸胃既病則不能受不能化心脾何所資乎心脾既無所資則無以運化而生精血矣故腸胃有病心脾受之則男為少精女為不月矣心脾當總言男女不當分説至隱曲不月方可分説耳若如釋者之言則男之精獨資於脾而不資於心女之血獨資於心而不資於脾有是理耶盖男女之精血皆由五臟六腑之相飬而後成可謂之男精資於脾女血資於心乎經本曰男女皆有心脾之病但在男子則隱曲之不利在女子則月事之不來耳煎厥論内經曰陽氣者煩勞則張精絶辟積於夏使人煎厥目盲不可以視耳閉不可以聽潰潰乎若壞都汨汨乎不可止王氏註曰張筋脈䐜脹也精絶精氣竭絶也既傷腎氣又損膀胱故當夏時使人煎厥斯乃房之患也既盲目視又閉耳聽則志意心神筋骨腸胃潰潰乎若壞汨汨乎煩悶而不可止愚竊味乎經其㫖昭然若無待於解者何註釋之乖逺如此乎請重釋之夫陽氣者人身和平之氣也煩勞者凡過於動作皆是也張主也謂亢極也精隂氣也辟積猶積疊謂怫鬱也衣褶謂之襞積者亦取積疊之義也積水之奔散曰潰都猶隄防也汨汨水流而不止也夫充於身者一氣而已本無異類也即其所用所病而言之於是乎始有異名耳故平則為正亢則為邪陽氣則因其和以飬人而名之及其過動而張亦即陽氣亢極而成火耳陽盛則隂衰故精絶水不制火故亢火鬱積之甚又當夏月火旺之時故使人煩熱之極若煎迫然而氣逆上也火炎氣逆故目盲耳閉而無所用此陽極欲絶故其精敗神去不可復生若隄防之崩壞而所儲之水奔散滂流莫能以遏之矣夫病至於此是壞之極矣王氏乃因不曉都字之義遂畧去此字而謂之若壞其可乎哉又以此病純為房患以張為筋脈䐜脹以汨汨為煩悶皆非是八味丸用澤瀉論張仲景八味丸用澤瀉宼宗奭本草衍義云不過接引桂附等歸就腎經别無他意而王海藏韙之愚謂八味丸以地黄為君而以餘藥佐之非止為補血之劑盖兼補氣也氣者血之母東垣所謂陽旺則能生隂血者此也若果專為補腎而入腎經則地黄山茱茰白茯苓牡丹皮皆腎經之藥固不待夫澤瀉之接引而後至也其附子官桂雖非足少隂經本藥然附子乃右腎命門之藥況浮中沉無所不至又為通行諸經引用藥官桂能補下焦熱火不足是亦右腎命門藥也易老亦曰補腎用肉桂然則桂附亦不待夫澤瀉之接引而後至矣唯乾山藥雖獨入手太隂經然其功亦能強隂且手太隂為足少隂之上原原既有滋流豈無益夫其用地黄為君者大補血虚不足與補腎也用諸藥佐之者山藥之強隂益氣山茱茰之強隂益精而壯元氣白茯苓之補陽長隂而益氣牡丹皮之瀉隂火而治神志不足澤瀉之飬五臟益氣力起隂氣而補虛損五勞桂附之補下焦火也由此觀之則余之所謂兼補氣者非臆説也且澤瀉也雖曰鹹以瀉腎邪非瀉腎之本也故五苓散用澤瀉者詎非瀉腎邪乎白茯苓亦伐腎邪即所以補正耳是則八味丸之用澤瀉者非他盖取其瀉腎邪飬五臟益氣力起隂氣補虚損五勞之功而已宼氏何疑其瀉腎而為接引桂附等之説乎然澤瀉固能瀉腎然從於諸補藥羣衆之中雖欲瀉之而力莫能施矣故當歸從於參茋則能補血從於大黄牽牛則能破血從於桂附茱茰則熱從於大黄芒硝則寒此非無定性也奪於羣衆之勢而不得不然也雖然或者又謂八味丸以附子為少隂之向𨗳其補自是地黄為主盖取其徤脾走下之性以行地黄之滯可致逺耳竊意如此則地黄之滯非附子不能及下矣然錢仲陽六味地黄丸豈有附子乎夫八味丸盖兼隂火不足者設六味地黄丸則惟隂虛者用之也小便原委論或問余曰靈樞經云水穀者常并居胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌别汁循下焦而滲入膀胱焉王冰曰水液自囘腸泌别汁滲入膀胱之中胞氣化之而為溺以泄出也楊介云水穀自小腸盛受於闌門以分别也其水則滲灌入於膀胱上口而為溲便詳已上三説則小便即泌别之水液滲入膀胱以出者也素問則曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱則小便又似水飲精㣲之氣上升脾肺運化而後成者也彼此不同將何所憑乎余曰憑夫理耳且夫溲溺者果何物耶水而已矣水之下流其性則然也故飲入於胃其精氣雖上升其飲之本體固不能上升也既不能上升則豈可謂小便獨為氣化所成者哉惟其不能上升者必有待於能上升者為之先導故素問又曰膀胱者津液藏焉氣化則能出矣且水者氣之子氣者水之母氣行則水行氣滯則水滯或者又謂小便純由泌别不由運化盖不明此理故也雖然膀胱固曰津液之府至於受盛津液則又有胞而居膀胱之中焉故素問曰胞移熱於膀胱靈樞經曰膀胱之胞薄以濡類纂曰膀胱者胞之室且夫胞之居於膀胱也有上口而無下口津液既盛於胞無由自出必因乎氣化而後能漸浸潤於胞外積於胞下之空處遂為溺以出於前隂也素問所謂膀胱津液藏焉者盖舉膀胱以該胞也若曰胞下無空處則人溺急時至厠安能即出乎夫惟積滿胞下空處而不可再容故急急則至厠即出矣或言胞有下口而無上口或言胞上下皆有口或言胞有小竅而為注泄之路不亦妄歟内傷餘議嘗觀夫東垣李氏所著内外傷辨有曰外傷風寒客邪有餘之病當瀉不當補内傷飲食勞役不足之病當補不當瀉自此論一出而天下後世始知内外之傷有所别而仲景之法不可例用矣其惠也不其大哉雖然夷考其言猶或有可疑者不敢䛕佞僣用條之如曰夫飲食勞倦傷而内熱者乃隂火乘其坤土之位故内熱以及於胸中也又曰内經有云勞者温之損者温之惟宜温藥以補元氣而瀉火邪内經曰温能除大熱故治之必温藥乃可耳又曰飲者無形之氣傷之則宜發汗利小便使上下分消其濕此飲謂酒也食者有形之物傷之則宜損其穀其次莫如消𨗳若此者皆不能使人無疑者也謹按素問調經論篇云帝曰隂虚生内熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣薫胸中故内熱嗟夫此内之説之原乎請釋其義如左夫人身之隂陽有以表裏言者有以上下之分言者有以氣血言者有以身前身後言者有以臟腑言者有以升降呼吸之氣言者餘如動靜語黙起居之類甚多不必悉舉此所謂隂虛之隂其所指與數者皆不同盖勞動之過則陽和之氣皆亢極而化為火矣況水穀之味又少入是故陽愈盛而隂愈衰也此隂虚之隂盖指身中之隂氣與水穀之味耳或以下焦隂分為言或以腎水真隂為言皆非也夫有所勞役者過動屬火也形氣衰少者壯火食氣也穀氣不盛者勞傷元氣則少食而氣衰也上焦不行者清陽不升也下脘不通者濁隂不降也夫胃受水穀故清陽升而濁隂降以𫝊化出入滋榮一身也今胃不能納而穀氣衰少則清無升而濁無降矣故曰上焦不行下脘不通然非謂絶不行不通也但比之平常無病時則謂之不行不通耳上不行下不通則鬱矣鬱則少火皆成壯火而胃居上焦下脘兩者之間故胃氣熱熱則上炎故熏胸中而為内熱也東垣所謂勞役形體所謂飲食失節而致熱者此言正與調經論篇之㫖相合固宜引此叚經文於内外傷辨以為之主而乃反不引此却謂隂火乘土位故内熱及胸中此不能無疑者也夫隂火二字素問靈樞難經未嘗言而東垣毎毎言之素問止有七節之傍中有小心二句而劉守真推其為命門屬火不屬水引仙經心為君火腎為相火之説以為之證然亦不以隂火名之是則名為隂火者其東垣始歟竊意内熱之作非皆隂火也但氣有鬱則成熱耳雖曰心為君火君不主令然素所叙諸病之屬熱者甚衆皆君火病也豈君火不能為病而直欲純歸之於隂火乎至真要大論云勞者温之損者益之夫勞則動之太過而神不寧矣故温之温也者飬也温之者所以調其飲食適其起居澄心息慮從容以待其真氣之復常也禮記所謂柔色以温之此温字正與此同或以藥扶助之亦飬也今東垣乃以温為温涼之温謂宜温藥以補元氣而瀉火邪又易損者益之為損者温之又以温能除大熱為内經所云而徧攷内經並無此語此亦不能無疑者也然温藥之補元氣瀉火邪者亦惟氣温而味甘者斯可矣盖温能益氣甘能助脾而緩火故元氣復而火邪熄也夫宜用温藥以為内傷不足之治則可以為勞者温之之註則不可隂陽應象論所謂形不足者温之以氣其温字亦是滋飬之義非指温藥也夫形不足乃陽虛而不充也氣者藥之氣也藥有氣厚氣薄味厚味薄味厚者屬隂而滋精氣厚者屬陽而滋形今以藥之氣厚者滋陽不兼形乎故曰形不足者温之以氣雖以藥温飬之亦未嘗不兼乎調食飲適起居與澄心息慮也温字固具二意然終不可視為温涼之温茍以補之除之抑之舉之散之等語比類而觀焉則其義自著矣夫金木水火土運於天地也則無刑質之可觀其麗於地則有形質矣金木土水者有形有質者也火者有形而質不實者也酒性雖熱體同於水今東垣乃謂飲者無形之氣此亦不能無疑者也既待發汗利小便以去之其可謂之無形之氣乎且勞倦傷飲食傷二者雖俱為内傷然不可混而為一難經所謂飲食勞倦則傷脾者盖謂皮主飲食而四肢亦屬脾故飲食失節勞役四肢皆能傷於脾耳非謂二者同類而無辨也夫勞倦傷飲食傷雖與風寒暑濕有餘之病不同然飲食傷又與勞倦傷不同勞倦傷誠不足也飲食傷尤當於不足之中分其有餘不足也何也盖飢餓不飲食與飲食太過雖皆是失節然必明其有兩者之分方盡其理也節者何無不及無太過之中道也夫饑餓不飲食者胃氣空虛此為不足固失節也飲食自倍而停滯者胃氣受傷此不足之中兼有餘亦失節也以受傷言則不足以停滯言則有餘矣惟其不足故補益惟其有餘故消𨗳亦有物滯氣傷必補益消𨗳兼行者亦有物暫滯而氣不甚傷宜消𨗳獨行不須補益者亦有既停滯不復自化不須消𨗳但當補益或亦不須補益者潔古枳术丸東垣橘皮枳术丸木香枳术丸之類雖曰消𨗳固有補益之意存乎其間其他如木香分氣丸𨗳氣枳實丸大枳殻丸之類雖無補益然施之於物暫滯氣不甚傷者豈不可哉但不可視為通行之藥耳止所滯之物非枳术丸之力所能去者亦安可泥於消𨗳而不知變乎故備急丸煑黄丸感應丸𤓰蒂散等之推逐者潔古東垣亦未嘗委之而弗用也故善將兵者攻亦當守亦當不善者則宜攻而守宜守而攻其敗也非兵之罪用兵者之罪耳觀乎此則知消𨗳補益推逐之理矣若夫勞倦傷則純乎補益固不待議雖東垣丁寧告戒然世人猶往往以苦寒之劑望除勞倦傷之熱及其不愈而反甚自甚而至危但曰病勢已極藥不能勝耳醫者病者生病者一委之天命皆懵然不悟其為妄治之失也嗚呼仁人君子能不痛心也哉夫東垣先哲之出類者也奚敢輕議但恨其白璧微瑕而或貽後人差毫釐謬千里之患故不得不僣踰耳知我者其鑒之外傷内傷所受經㫖異同論客或難予曰素問隂陽應象論云天之邪氣感則風人五臟水穀之寒熱感則害人六腑太隂陽明論云犯賊風虛邪者陽受之食飲不節起居不時者隂受之陽受之則入六腑隂受之則入五臟兩説正相反願聞其解余復之曰此所謂似反而不反者也夫感天之邪氣犯賊風虛邪外傷有餘之病感水穀寒熱食飲不節内傷不足之病也二者之傷腑臟皆嘗受之但隨其所從所發之處而為病耳不可以此兩説之異而致疑盖並行不相悖也讀者當合而觀之其㫖斯盡若曰不然請以諸處所論証之金匱真言論曰風觸五臓邪氣發病八正神明論曰夫八正之虛邪以身之虛逢天之虛兩虛相感其氣至骨入則五臓傷靈樞經曰五臓之中風又曰東風傷人内舍於肝南風傷人内舍於心西南風傷人内舍於脾西風傷人内舍於肺北風傷人内舍於腎觀乎此則天之邪氣固傷五臓矣靈樞又曰邪之中人也無有常中於隂則溜於腑又曰虛邪之中人也始從皮膚以入其𫝊自絡脈而經而輸而伏衝之脈以至於腸胃又曰東北風傷人内舍於大腸西北風傷人内舍於小腸東南風傷人内舍於胃觀乎此則天之邪氣豈不傷六腑乎素問曰飲食自倍腸胃乃傷觀乎此則水穀寒熱固傷六腑矣靈樞又曰形寒寒飲則傷肺難經曰飲食勞倦則傷脾觀乎此則水穀寒熱豈不傷五臓乎至於地之濕氣亦未必專害皮肉筋脈而不能害臓腑邪氣水穀亦未必專害臓腑而不能害皮肉筋脈也但以邪氣無形臓主藏精氣故以類相從而多傷臓水穀有形腑主傳化物故因其所由而多傷腑濕氣浸潤其性緩慢其入人也以漸其始也自足故從下而上從淺而深而多傷於皮肉筋脈耳孰謂濕氣全無及於臓腑之理哉至若起居不時一語盖勞役所傷之病不系上文異同之義故不之及也醫經㴑􅋡集卷下
