body:
  text: 醫經溯洄集目録醫家類卷上神農嘗百草論亢則害承乃制論四氣所傷論張仲景傷寒立法考傷寒溫病熱病説傷寒三隂病或寒或熱辨陽虛隂盛陽盛隂虛論傷寒三百九十七法辨卷下傷寒四逆厥辨嘔吐噦乾嘔咳逆辨中風辨中暑中熱辨積熱沈寒論瀉南方補北方論五鬱論二陽病論煎厥論八味丸論小便原委論內傷餘議外傷內傷所受經旨異同論臣等謹案醫經溯洄集二卷元王履撰履字安道崑山人學醫於金華朱彥修盡得其術至明初始卒故明史載入方伎傳中其實乃元人也嘗以陽明篇無目痛少陰篇言胸背滿不言痛太陰篇無嗌乾厥陰篇無囊縮必有脫簡乃取三百九十七法去其重復者二百三十八條復增益之仍為三百九十七法因極論內外傷經旨異同併中風中暑之辨撰為此書凡二十一篇其間闡發明切者如亢則害承乃制及四氣所傷皆前人所未及他若溫病熱病之分三陰寒熱之辨以及瀉南補北諸論尤確有所見又以素問云傷寒為病熱言常不言變至仲景始分寒熱然義猶未盡乃備常與變作傷寒立法考一篇李中梓嘗稱之觀其厯數諸家俱不免有微詞而內傷餘議兼及東垣可謂少可而多否者然其會通研究洞見本原於醫道中實能貫徹源流非漫為大言以夸世也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1fba3d885d9077dc05e598706736e9031fa82319a3cda56e9ca1e0e20bde6dcb
