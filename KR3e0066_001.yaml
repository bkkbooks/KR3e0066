body:
  text: 醫經溯洄集卷上元王履撰神農嘗百草論淮南子云神農嘗百草一日七十毒豫嘗誦其書每至於此未始不嘆夫孟子所謂盡信書則不如無書夫神農立極之大聖也閔生民之不能以無疾故察夫物性之可以愈疾者以貽後人固不待乎物物必嘗而始知也茍待乎物物必嘗而始知則不足謂之生知之聖也以生知之聖言之則雖不嘗亦可知也設使其所知果有待乎必嘗則愈疾之功非疾不能以知之豈神農衆疾俱備而歷試之乎况汚穢之藥不可嘗者其亦嘗乎且味固可以嘗而知其氣其性其行經主治及畏惡反忌之類亦可以嘗而知乎茍嘗其所可嘗不可嘗者既可知而可嘗者亦不必待乎嘗之而後知矣謂其不嘗不可也謂其悉嘗亦不可也然經於諸藥名下不著氣性等字獨以味字冠之者由藥入口惟味為先故也又藥中雖有玉石蟲獸之類其至衆者惟草為然故遂曰嘗百草耳豈獨嘗草哉夫物之有毒嘗而毒焉有矣豈中毒者日必七十乎設以其七十毒偶見於一日而記之則毒之小也固不死而可解毒之大也則死矣孰能解之亦孰能復生之乎先正謂淮南之書多寓言夫豈不信亢則害承乃制論豫讀內經六微㫖論至於亢則害承乃制喟然嘆曰至矣哉其造化之樞紐乎王太僕發之於前劉河間闡之於後聖人之藴殆靡遺矣然學者尚不能釋然得不猶有未悉之㫖也歟謹按內經帝曰願聞地理之應六節氣位何如岐伯曰顯明之右君火之位也君火之右退行一步相火治之復行一步土氣治之復行一步金氣治之復行一步水氣治之復行一步木氣治之復行一步君火治之相火之下水氣承之水位之下土氣承之土位之下風氣承之風位之下金氣承之金位之下火氣承之君火之下隂精承之帝曰何也岐伯曰亢則害承乃制制生則化外列盛衰害則敗亂生化大病嘗觀夫隂陽五行之在天地間也髙者抑之下者舉之强者折之弱者濟之蓋莫或使然而自不能不然也不如是則髙者愈髙下者愈下强者愈强弱者愈弱而乖亂之政日以極矣天地其能位乎雖然髙也下也弱與强也亦莫或使然而自不能不然也故易也者造化之不可常也惟其不可常故神化莫能以測莫測故不息也可常則息矣亢則害承乃制者其莫或使然而自不能不然者歟夫太僕河間已發揮者兹不贅及其未悉之㫖請推而陳之夫自顯明之右止君火治之十五句言六節所治之位也自相火之下止隂精承之十二句言地理之應乎歲氣也亢則害承乃制三句言抑其過也制生則化止生化大病四句言有制之常與無制之變也承猶隨也然不言隨而曰承者以下言之則有上奉之象故曰承雖謂之承而有防之之義存焉亢者過極也害者害物也制者克勝之也然所承也其不亢則隨之而已故雖承而不見既亢則克勝以平之承斯見矣然而迎之不知其所來迹之不知其所止固若有不可必者然可必者常存乎杳冥恍惚之中而莫之或欺也河間曰已亢過極則反似勝已之化似也者其可以形質求哉故後篇厥隂所至為風生終為肅少隂所至為熱生終為寒之類其為風生為熱生者亢也其為肅為寒者制也又水發而為雹雪土發而飄驟之類其水發土發者亢也其雹雪飄驟者制也若然者蓋造化之常不能以無亢亦不能以無制焉耳夫前後二篇所作雖有歲運氣運之殊然亢則害承乃制之道蓋無往而不然也惟其無往而不然故求之於人則五臟更相平也一臟不平所不勝平之五臟更相平非不亢而防之乎一臟不平所不勝平之非既亢而克勝之乎姑以心火而言其不亢則腎水雖心火之所畏亦不過防之而已一或有亢即起而克勝之矣餘臟皆然制生則化當作制則生化蓋傳寫之誤而釋之讀之者不覺求之不通遂併遺四句而弗取殊不知上二句止言亢而害害而制耳此四句乃害與制之外之餘意也茍或遺之則無以見經㫖之周悉矣制則生化正與下文害則敗亂相對辭理俱順不勞曲說而自通制則生化者言有所制則六氣不至於亢而為平平則萬物生生而變化無窮矣化為生之盛故生先於化也外列盛衰者言六氣分布主治迭為盛衰昭然可見故曰外列害則敗亂生化大病者言既亢為害而無所制則敗壞乖亂之政行矣敗壞乖亂之政行則其變極矣其灾甚矣萬物其有不病者乎生化指所生所化者言謂萬物也以變極而灾甚故曰大病上生化以造化之用言下生化以萬物言以人論之制則生化猶元氣周流滋營一身凡五臟六腑四肢百骸九竅皆藉焉以為動靜云為之主生化大病猶邪氣恣橫正氣耗散凡五臟六腑四肢百骸九竅舉不能遂其運用之常也或以害為自害或以承為承襲或以生為自無而有化為自有而無或以二生化為一意或以大病為喻造化之機息此數者皆非也且夫人之氣也固亦有亢而自制者茍亢而不能自制則湯液針石𨗳引之法以為之助若天地之氣其亢而自制固復於平亢而不制者其孰助哉雖然造化之道茍變至於極則亦終必自反而復其常矣學者能本之於太僕河間而參之此論則造化樞紐之詳亦庶矣乎然張戴人治法心要則曰假令水為母木為子當春旺之時冬令猶在即水亢也水亢極則木令不至矣木者繼冬而承水也水既亢則害其所承矣所以木無權也木無權則無以制土土既旺則水乃受制也土者繼長夏之令也水受土制則熱克其寒也變而為濕此其權也又如火為母土為子當長夏之時暄令猶在即火亢也火既亢極則濕令不至矣濕者繼夏而承火也火既亢則害其所承矣所以濕無權也濕無權則無以制水水既旺則火乃受制也水者嚴冬之令也火受水制寒克其熱也變而為土濕土斯得其權也斯言也推之愈詳而違經愈逺矣或曰心要者他人成之蓋得於所聞之訛耳四氣所傷論素問生氣通天論篇曰春傷於風邪氣留連乃為洞泄夏傷於暑秋為痎瘧秋傷於濕上逆而咳發為痿厥冬傷於寒春必病溫隂陽應象論篇曰春傷於風夏生飱泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫王啓𤣥注云風中於表則內應於肝肝氣乘脾故洞泄或飱泄夏暑已甚秋熱復收兩熱相攻則為痎瘧秋濕既勝冬水復旺水濕相得肺氣又衰故乘肺而為咳嗽其發為痿厥者蓋濕氣內攻於臟腑則咳逆外散於筋脉則痿弱也厥謂逆氣也冬寒且凝春陽氣發寒不為釋陽怫於中寒怫相持故為溫病傷寒論引素問後篇八句成無已注云當春之時風氣大行春傷於風風氣通於肝肝以春適旺風雖入之不能即發至夏肝衰然後始動風淫末疾則當發於四肢夏以陽氣外盛風不能外發故攻內而為飱泄當秋之時濕氣大行秋傷於濕濕則干於肺肺以秋適旺濕雖入之不能即發至冬肺衰然後濕始動也雨淫腹疾則當發為下利冬以陽氣內固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷於暑夏以隂為主內暑雖入之勢未能動及秋隂出而陽為內主然後暑動摶隂而為痎瘧當冬之時寒氣大行冬傷於寒冬以陽為主內寒雖入之勢未能動及春陽出而隂為內主然後寒動摶陽而為溫病王海藏曰木在時為春在人為肝在天為風當春之時發為溫令反為寒折是三春之月行三冬之令也以是知水太過矣水既太過金肅愈嚴是所勝者乘之而妄行也所勝者乘之則木虛明矣木氣既虛火令不及是所生者受病也故所不勝者侮之是以土來木之分變而為飱泄也所以病發於夏者以木絶於夏而土旺於夏濕本有下行之體故也不病於春者以春時風雖有傷木實當權故也暑季夏也季夏者濕土也君火持權不與之子暑濕之令不行也濕令不行則土虧矣所勝妄行木氣太過少陽旺也所生者受病則肺金不足所不勝者侮之故水得以來土之分土者坤也坤在申之分申為相火水入於土則水火相干水火相干則隂陽變爭故為寒熱兼木氣終見三焦是少陽相火合也少陽在濕土之分故為寒熱肺金不足灑淅寒熱此皆往來未定之氣也故為痎瘧不發於夏而發於秋者以濕熱在酉之分得其權故也秋者清肅之氣收斂下行之體也為濕所傷是長夏之氣不與秋令也秋令不及所勝妄行故火得以炎上而克金心火既刑於肺故肺氣逆而為咳所不勝者侮之木氣上行與火同德動而不息者也所生者受病故腎水虧也長夏已亢三焦之氣盛也命門者三焦之合也故迫腎水上行與脾土濕熱相合為疾因咳而動於脾之濕是以咳嗽有聲有涎不發於秋而發於冬者以其六隂之極肅殺始得其氣故也冬傷於寒者是冬行春令也當寒而溫火勝而水虧矣水既已虧則所勝妄行土有餘也所生受病木不足也所不勝者侮之火太過也火土合德濕熱相助故為溫病不病於冬而病於春者以其寒水居卯之分方得其權大寒之令復行於春腠理開泄少隂不藏房室勞傷辛苦之人陽氣泄於外腎水虧於內當春之月時强木長無以滋生化之原故為溫病耳夫春傷於風夏傷於暑冬傷於寒辭理皆順時字傷令字也獨秋傷於濕說作令字傷時字讀者不可疑也此四說皆無所亢而害其所承之子也若說秋字傷濕字其文與上三句相通矣大抵理與法通不必拘於文也或謂春傷於風是人為風所傷非也若是則止當頭痛惡風自汗何以言夏為飱泄哉今言春傷於風即是時傷令也明矣愚按此四傷諸家注釋皆不得經㫖者蓋由推求太過故也孟子曰道在邇而求諸逺事在易而求諸難此之謂歟但只輕輕平易說去則經㫖自明而無穿鑿之患矣何以言之夫風暑濕寒者天地之四氣也其傷於人人豈能於未發病之前預知其客於何經絡何臟腑何部分而成何病乎及其既發病然後可以診候始知其客於某經絡某臟腑某部分成某病耳注釋者茍悟因病始知其原之理則於此四傷不勞餘力自迎刃而解矣夫洞泄也痎瘧也咳與痿厥也溫病也皆是因其發動之時形診昭著乃逆推之而知其昔日致病之原為傷風傷暑傷濕傷寒耳非是初受傷之時能預定其今日必為此病也且夫傷於四氣有當時發病者有過時發病者有久而後發病者有過時之久自消散而不成病者何哉蓋由邪氣之傳變聚散不常及正氣之虛實不等故也且以傷風言之其當時而發則為惡風發熱頭疼自汗咳嗽喘促等病其過時與久而發則為厲風熱中寒中偏枯五臟之風等病是則洞泄飱泄者乃過時而發之中之二病耳因洞泄飱泄之病生以形診推之則知其為春傷風藏蓄而致此也茍洞泄飱泄之病未生孰能知其已傷風於前將發病於後邪假如過時之久自消散而不成病者人亦能知乎世有太素脈法雖或預知死亡之期然亦因診之昭著而始能知耳夏傷暑為痎瘧冬傷寒為溫病意亦類此但秋傷濕上逆為咳嗽為痿厥其視病知原則與三者同其令行於時則與三者異夫春之風夏之暑冬之寒皆是本時之令也濕乃長夏之令何於秋言之蓋春夏冬每一時各有三月故其令亦各就其本時而行也若長夏則寄旺於六月之一月耳秋雖亦有三月然長夏之濕令每侵過於秋而行故曰秋傷於濕秋令為燥然秋之三月前近於長夏其不及則為濕所勝其太過則同於火化其平氣則又不傷人此經所以於傷人止言風暑濕寒而不言燥也或問余曰五運六氣七篇所叙燥之為病甚多何哉余曰運氣七篇與素問諸篇自是兩書作於二人之手其立意各有所主不可混言王氷以為七篇參入素問之中本非素問元文也余今所推之意乃是素問本㫖當自作一意看請陳四氣所傷所病之義夫風者春之令也春感之偶不即發而至夏邪既不散則必為疾其所以為洞泄者風蓋天地浩蕩之氣飛揚鼓舞神速不恆人身有此腸胃之職其能從容傳化泌别而得其常乎故水穀不及分别而併趨下以泄出也其為飱泄亦類此義說者謂春傷風為內通肝洞泄飱泄為木乘土又謂不發於春為邪避木旺發於夏為木衰邪動竊謂風既通肝則正當木旺之時木極盛土極衰矣理宜乘旺而即發於春不宜反過時而發於夏也且夏火司權母能滋子何故不發於土衰極之時而反發於土受滋之時乎其說不通難以慿據暑者夏之令也夏感之偶不即發而至秋又傷於風與寒故為痎瘧也寒者冬之令也冬感之偶不即發而至春其身中之陽雖始為寒邪所鬱不得順其漸升之性然亦必欲應時而出故發為溫病也若夫秋傷濕其令行於時之義上文已論之矣前篇所謂上逆而咳發為痿厥不言過時似是當時即發者但既與風暑寒三者並言則此豈得獨為即發者乎然經無明文終亦不敢比同後篇便斷然以為冬發病也雖然濕本長夏之令侵過於秋耳縱使即發亦近於過時而發者矣此當只以秋發病為論濕從下受故干肺為咳謂之上逆夫肺為諸氣之主今既有病則氣不外運又濕滯經絡故四肢痿弱無力而或厥冷也後篇所謂冬生咳嗽既言過時則與前篇之義頗不同矣夫濕氣久客不散至冬而寒氣大行肺惡寒而或受傷故濕氣得以乘虛上侵於肺發為咳嗽也觀者以此意求之經㫖其或著乎或者見素問於病溫痎瘧等間以必言之遂視為一定不易之辭而曰此必然之道嗟乎果可必耶果不可必耶素問之或言必或不言必者蓋不可膠為一定故也往往有泥於必之一字遂謂冬傷寒必當病於春其名傷寒而即病者反置而不論若此者可不謂之棄本逐末乎經中每有似乎一定不易之論而却不可以為一定不易者如曰熱厥因醉飽入房而得熱中消中者皆富貴人也新沐中風則為首風如此之類豈一一皆然哉讀者當活法勿拘執也夫王啓𤣥之注雖未免泥於必字及未得經㫖然却不至太逺也若成無己之說則似太逺矣然猶未至於甚也至王海藏立論則推求過極欲異於人殊不知反穿鑿綴緝乖悖經㫖有不可勝言者此先儒所謂如大軍游騎出太逺而無所歸矣姑托成無己王海藏之說辨其甚者一二夫無己謂風淫末疾則當發於四肢雨淫腹疾則當發為下利竊謂則當二字决然之辭也春傷風遇夏之陽氣外盛而不能外發故攻內為飱泄此或若可通矣經曰木發無時倘風不傷於春而傷於他時不遇夏之陽氣外盛將外發乎將內攻乎況風屬陽與夏同氣果欲外出則當隨其散越之勢而出安有不能之理乎且風善行數變而為病非一豈獨能為四肢之疾乎所謂雨淫腹疾之義其不通亦如此至若夏傷暑秋為痎瘧者蓋因暑疾藏於皮膚之內腸胃之外復秋感風故疾作耳觀素問瘧論可見其與夏隂主內秋陽內主暑動摶隂何相干哉冬傷寒春為溫病者蓋因寒毒中人肌膚陽受所鬱至春天地之陽氣外發其人身受鬱之陽亦不能不出故病作也韓祗和謂冬時感寒鬱陽至春時再有感而後發余謂此止可論溫病之有惡寒者耳其不惡寒者則本不為再感而後發也故仲景曰太陽疾不發熱而渴不惡寒者為溫病觀傷寒論可見其與冬陽主內春隂內主寒動摶陽何相干哉乃若海藏則又以春傷風夏傷暑冬傷寒為時傷令秋傷濕為令傷時故於春傷風謂春行冬令而溫為寒折於夏傷暑謂暑者季夏季夏者濕土君火持權不與子而暑濕令不行於秋傷濕謂秋為濕所傷是長夏之氣不與秋令於冬傷寒謂冬行春令火勝水虧大寒之令復行於春陽氣外泄腎水內虧者病又謂溫病為濕熱相助而成又謂四時傷皆母亢而害所承之子吁何支離破碎徒費辭如此乎夫經中所言傷風傷暑之類甚多皆是以人受風暑等所傷為義未嘗有時傷令令傷時之意也若如海藏所言則瘧論所謂夏傷於暑秋傷於風與先傷於風後傷於寒等語其時傷令歟令傷時歟吾固知其不能不屈於此也且暑為夏令孰不知之今以暑為季夏為濕土得不怪哉今冬果行春令人若感此則成冬溫病矣安得為春溫病乎其謂大寒之令復行於春溫病方作設使大寒之令不復行於春其溫病當作者遂不作乎況今之春為溫病者比比皆是未嘗見其必由大寒復行於春而後成也經曰亢則害承乃制其義謂已亢極則勝己者來制如火亢極則水來制之經所謂相火之下水氣承之水位之下土氣承之之類皆是勝己者為承今以亢為母承為子將求勝於經歟抑未達歟又如以制物者為所勝受制者為所不勝與經所謂氣有餘則制己所勝而侮所不勝及傳之於其所勝死於其所不勝之㫖全反矣余於因時傷令令傷時之說委曲衍說者固不暇悉辨也嗚呼豫非好斥前人之非蓋為其有害大義晦蝕經㫖以誤後人故不敢諛順而默默耳然而僣逾之罪固己自知其不得辭矣但未知觀者以為何如張仲景傷寒立法考讀仲景之書當求其所以立法之意茍得其所以立法之意則知其書足以為萬世法而後人莫能加莫能外矣茍不得其所以立法之意則疑信相雜未免通此而礙彼也嗚呼自仲景以來發明其書者不可以數計然其所以立法之意竟未聞有表章而示人者豈求之而不得之歟將相循習而不求歟抑有之而余未之見歟余雖不敏僣請陳之夫傷於寒有即病者焉有不即病者焉即病者發於所感之時不即病者過時而發於春夏也即病謂之傷寒不即病謂之溫與暑夫傷寒溫暑其類雖殊其所受之原則不殊也由其原之不殊故一以傷寒而為稱由其類之殊故施治不得以相混以所稱而混其治宜乎貽禍後人以歸咎於仲景之法而委廢其大半也吁使仲景之法果貽禍於後人傷寒論不作可也使仲景之法果不貽禍於後人傷寒論其可一日缺乎後人乃不歸咎於己見之未至而歸咎於立法之大賢可謂溺井怨伯益失火怨燧人矣夫仲景法之祖也後人雖移易無窮終莫能越其矩度由莫能越而觀之則其法其方果可委廢大半哉雖然立言垂訓之士猶不免失於此彼碌碌者固無足誚矣夫惟立言垂訓之士有形乎著述之間其碌碌者當趑趄猶預之餘得不靡然從令爭先快覩而趨簡略之地乎夫其法其方委廢大半而不知返日惟簡便是趨此民生之所以無藉而仲景之心之所以不能别白矣嗚呼法也方也仲景專為即病之傷寒設不兼為不即病之溫暑設也後人能知仲景之書本為即病者設不為不即病者設則尚恨其法散落所存不多而莫能禦夫粗工妄治之萬變果可憚煩而或廢之乎是知委廢大半而不覺其非者由乎不能得其所以立法之意故也今人雖以治傷寒法治溫暑亦不過借用耳非仲景立法之本意也猶六書假借雖移易無窮終非造字之初意夫仲景立法天下後世之權衡也故可借焉以為他病用雖然豈特可借以治溫暑而已凡雜病之治莫不可借也今人因傷寒治法可借以治溫暑遂謂其法通為傷寒溫暑設吁此非識流而昧原者歟茍不余信請以證之夫仲景之書三隂經寒證居熱證什之七八彼不即病之溫暑但一於熱耳何由而為寒哉就三隂寒證而詳味之然後知余言之不妄或者乃謂三隂寒證本是雜病為王叔和增入其中又或謂其證之寒蓋由寒熱誤治而致若此者皆非也夫叔和之增入者辨脉平脉與可汗可下等諸篇而已其六經病篇必非叔和所能贊辭也但厥隂經中下利嘔噦諸條却是叔和因其有厥逆而附遂併無厥逆而同類者亦附之耳至若以藥誤治而成變證則惟太陽為多縱使三隂證亦或有寒藥誤治而變寒者然豈應如是之衆乎夫惟後人以仲景書通為傷寒溫暑設遂致諸溫劑皆疑焉而不敢用韓祗和雖覺桂枝湯之難用但謂今昔之世不同然未悟仲景書本為即病之傷寒設也且其著微㫖一書又純以溫暑作傷寒立論而即病之傷寒反不言及此已是舍本狥末全不能窺仲景藩籬又以夏至前胸膈滿悶嘔逆氣塞腸鳴腹痛身體拘急手足逆冷等證視為溫暑謂與仲景三隂寒證乃是冬時即病之傷寒證脉理同而證不同遂别立溫中法以治夫仲景所叙三隂寒證乃是冬時即病之傷寒故有此證今欲以仲景所叙三隂寒證求對於春夏溫暑之病不亦惛乎雖然祗和未悟仲景立法本㫖而又適當溫暑病作之際其為惑也固宜以余觀之其胸膈滿悶嘔逆氣塞等證若非內傷冷物則不正暴寒所中或過服寒藥所變或內外俱傷於寒之病也且祗和但曰寒而當溫然未嘗求其所以為寒之故能求其故則知溫暑本無寒證矣考之仲景書雖有隂毒之名然其所叙之證不過面目青身痛如被杖咽㗋痛而已並不言隂寒極盛之證況其所治之方亦不過升麻甘草當歸鱉甲而已並不用大溫大熱之藥是知仲景所謂隂毒者非隂寒之病乃是感天地惡毒異氣入於隂經故曰隂毒耳後之論者遂以為隂寒極甚之證稱為隂毒乃引仲景所叙面目青身痛如被杖咽㗋痛數語併而言之却用附子散正陽散等藥以治竊謂隂寒極甚之證固亦可名為隂毒然終非仲景所以立名之本意觀後人所叙隂毒自是兩般豈可混論後人所叙隂毒亦只是內傷冷物或不正暴寒所中或過服寒藥所變或內外俱傷於寒而成耳非天地惡毒異氣所中者也朱奉議作活人書纍數萬言於仲景傷寒論多有發明其傷寒即入隂經為寒證者諸家不識而奉議識之但惜其亦不知仲景專為即病者立法故其書中每每以傷寒溫暑混雜議論竟無所别況又視傷寒論為全書遂將次傳隂經熱證與即入隂經寒證牽合為一立說且謂大抵傷寒陽明證宜下少隂證宜溫而於所識即入隂經之見又未免自相悖矣夫陽明證之宜下者固為邪熱入胃其少隂證果是傷寒傳經熱邪亦可溫乎況溫病之少隂尤不可溫也自奉議此說行而天下後世䝉害者不少矣逮夫成無已作傷寒論注又作明理論其表章名義纎悉不遺可謂善羽翼仲景者然即入隂經之寒證又不若朱奉議能識況即病立法之本㫖乎宜其莫能知也惟其莫知故於三隂諸寒證止隨文解義而已未嘗明其何由不為熱而為寒也至於劉守真出亦以溫暑作傷寒立論而遺即病之傷寒其所處辛涼解散之劑固為昧者有中風傷寒錯治之失而立蓋亦不無桂枝麻黃難用之惑也既惑於此則無由悟夫仲景立桂枝麻黃湯之有其時矣故其原病式有曰夏熱用麻黃桂枝之類熱藥發表須加寒藥不然則熱甚發黃或斑出矣此說由於龎安常而朱奉議亦從而和之殊不知仲景立麻黃湯桂枝湯本不欲用於夏熱之時也茍悟夫桂枝麻黃湯本非治溫暑之劑則羣疑氷泮矣何也夫寒之初客於表也閉腠理鬱陽氣而為熱故非辛溫之藥不能開腠理以泄其熱此麻黃湯之所由立也至於風邪傷表雖反疏腠理而不能閉然邪既客表則表之正氣受傷而不能流通故亦發熱也必以辛甘溫之藥發其邪則邪去而腠理自密矣此桂枝湯之所由立也其所以不加寒藥者蓋由風寒在表又當天令寒冷之時而無所避故也後人不知仲景立法之意故有惑於麻黃桂枝之熱有犯於春夏之司氣而不敢用於是有須加寒藥之論夫欲加寒藥於麻黃桂枝湯之中此乃不悟其所以然故如此耳若仲景為溫暑立方必不如此必别有法但惜遺佚不傳致使後人有多岐之患若知仲景傷寒論專為即病傷寒作則知麻黃桂枝所以宜用之故除傳經熱證之外其直傷隂經與太陽不鬱熱即傳隂經諸寒證皆有所歸著而不復疑為寒藥誤下而生矣若乃春夏有惡風惡寒純類傷寒之證蓋春夏暴中風寒之新病非冬時受傷過時而發者不然則或是溫暑將發而復感於風寒或因感風寒而動乎久鬱之熱遂發為溫暑也仲景曰太陽病發熱而渴不惡寒者為溫病觀此則知溫病不當惡寒而當渴其惡寒而不渴者非溫病矣仲景雖不言暑病然暑病與溫病同但復過一時而加重於溫病耳其不惡寒而渴則無異也春夏雖有惡風惡寒表證其桂枝麻黃二湯終難輕用勿泥於發表不逺熱之語也於是用辛涼解散庶為得宜茍不慎而輕用之誠不能免夫狂躁斑黃衄血之變而亦無功也雖或者行桂枝麻黃於春夏而效乃是因其辛甘發散之力偶中於萬一斷不可視為常道而守之今人以敗毒散參蘇飲通解散百解散之類不問四時中風傷寒一例施之雖非至正之道較之不慎而輕用麻黃桂枝於春夏以致變者則反庶幾然敗毒散等若用於春夏亦止可治暴中風寒之證而已其冬時受傷過時而發之溫病暑病則不宜用也用則非徒無益亦反害之矣縱或有效亦是偶然彼冬時傷寒用辛涼發表而或效者亦偶然也凡用藥治病其既效之後須要明其當然與偶然能明其當然與偶然則精微之地安有不至者乎惟其視偶然為當然所以循非踵弊莫之能悟而病者不幸矣若夫仲景於三隂經每用溫藥正由病之所必須與用之有其時耳餘有别論兹不再具若槩以三隂寒證視為雜病而外之得無負於仲景濟人利物之至仁而誤後世乎自近代先覺不視傷寒溫暑異治之端緒但一以寒涼為主而諸溫熱之劑悉在所略致使後之學者視仲景書欲仗焉而不敢以終決欲棄焉則猶以為立法之祖而莫能外甚則待為文具又甚則束之髙閣而謂其法宜於昔而不宜於今由治亂動靜之殊治靜屬水亂動屬火故其溫熱之藥不可用於今屬火之時也噫斯言也其果然耶否耶但能明乎仲景本為即病者設法則桂枝麻黃自有所用諸溫熱之劑皆不可略矣若謂仲景法不獨為即病者設則凡時行及寒疫溫瘧風溫等病亦通以傷寒六經病諸方治之乎傷寒例曰冬溫之毒與傷寒大異為治不同又曰寒疫與溫及暑病相似但治有殊耳是則溫暑及時行寒疫溫瘧風溫等仲景必别有治法今不見者亡之也觀其所謂為治不同所謂溫瘧風溫溫毒溫疫脉之變證方治如說豈非亡其法乎決不可以傷寒六經病諸方通治也夫素問謂人傷於寒則為病熱者言常而不言變也仲景謂或熱或寒而不一者備常與變而弗遺也仲景蓋言古人之所未言大有功於古人者雖欲偏廢可乎叔和搜採仲景舊論之散落者以成書功莫大矣但惜其既以自己之說混於仲景所言之中又以雜脈雜病紛紜並載於卷首故使玉石不分主客相亂若先備仲景之言而次附己說明書其名則不致惑於後人而纍仲景矣昔漢儒收拾殘編斷簡於秦火之餘加以傳注後之議者謂其功過相等叔和其亦未免於後人之議歟余嘗欲編類其書以傷寒例居前而六經病次之相類病又次之差後病又次之診察治法治禁治誤病解未解等又次之其雜脈雜病與傷寒有所關者采以附焉其與傷寒無相關者皆刪去如此庶幾法度純一而玉石有分主客不亂矣然有志未暇姑叙此以俟他日傷寒溫病熱病說有病因有病名有病形辨其因正其名察其形三者俱當始可以言治矣一或未明而曰不誤於人吾未之信也且如傷寒此以病因而為病名者也溫病熱病此以天時與病形而為病名者也由三者皆起於感寒或者通以傷寒稱之夫通稱傷寒者原其因之同耳至於用藥則不可一例而施也何也夫傷寒蓋感於霜降後春分前然不即發鬱熱而發於春夏者也傷寒即發於天令寒冷之時而寒邪在表閉其腠理故非辛甘溫之劑不足以散之此仲景桂枝麻黃等湯之所以必用也溫病熱病後發於天令暄熱之時怫熱自內而達於外鬱其腠理無寒在表故非辛涼或苦寒或酸苦之劑不足以解之此仲景桂枝麻黃等湯獨治外者之所以不可用而後人所處水解散大黃湯千金湯防風通聖散之類兼治內外者之所以可用也夫即病之傷寒有惡風惡寒之證者風寒在表而表氣受傷故也後發之溫病熱病有惡風惡寒之證者重有風寒新中而表氣亦受傷故也若無新中之風寒則無惡風惡寒之證故仲景曰太陽病發熱而渴不惡寒者為溫病溫病如此則等熱病亦如此是則不渴而惡寒者非溫熱病矣然或有不因新中風寒亦見惡風惡寒之證者蓋病人表氣本虛熱達於表又重傷表氣故不禁風寒非傷風惡風傷寒惡寒也但衛虛則惡風榮虛則惡寒耳且溫病熱病亦有先見表證而後傳裏者蓋怫熱自內達外熱鬱腠理不得外泄遂復還裏而成可攻之證非如傷寒從表而始也或者不悟此理乃於春夏溫病熱病而求浮緊之脈不亦疏乎殊不知緊為寒脈有寒邪則見之無寒邪則不見也其溫病熱病或見緊脈者乃重感不正之暴寒與內傷過度之冷食也豈其本然哉又或者不識脈形但見弦便呼為緊斷為寒而妄治蓋脈之盛而有力者每每兼弦豈可錯認為緊而斷為寒夫溫病熱病之脈多在肌肉之分而不甚浮且右手反盛於左手者誠由怫熱在內故也其或左手盛或浮者必有重感之風寒否則非溫病熱病自是暴感風寒之病耳凡溫病熱病或無重感表證雖間見而裏病為多故少有不渴者斯時也法當治裏熱為主而解表兼之亦有治裏而表自解者余每見世人治溫熱病雖誤攻其裏亦無大害誤發其表變不可言此足以明其熱之自內達外矣其間有誤攻裏而致大害者乃春夏暴寒所中之疫證邪純在表未入於裏故也不可與溫病熱病同論夫惟世以溫病熱病混稱傷寒故每執寒字以求浮緊之脈以用溫熱之藥若此者因名亂實而戕人之生名其可不正乎又方書多言四時傷寒故以春夏之溫病熱病與秋冬之傷寒一類視之而無所别夫秋冬之傷寒真傷寒也春夏之傷寒寒疫也與溫病熱病自是兩塗豈可同治吁此弊之來非一日矣歷考方書並無救弊之論每每雷同良可痛哉雖然傷寒與溫病熱病其攻裏之法若果是以寒除熱固不必求異其發表之法斷不可不異也況傷寒之直傷隂經與太陽雖傷不及鬱熱即傳隂經為寒證而當溫者又與溫病熱病大不同其可妄治乎或者知一不知二故謂仲景發表藥今不可用而攻裏之藥乃可用嗚呼其可用不可用之理果何在哉若能辨其因正其名察其形治法其有不當者乎彼時行不正之氣所作及重感異氣而變者則又當觀其何時何氣參酌傷寒溫熱病之法損益而治之尤不可例以仲景即病傷寒藥通治也傷寒三隂病或寒或熱辨嘗讀張仲景傷寒論於太隂有曰自利不渴者屬太隂以其臟有寒故也當溫之宜服四逆輩於少隂有曰少隂病得之一二日口中和其背惡寒者當炙之附子湯主之少隂病身體痛手足寒骨節痛脈沉者附子湯主之少隂病下利白通湯主之少隂病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加猪膽汁湯主之少隂下利清穀裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者用通脈四逆湯於厥隂有曰手足厥寒脈細欲絶者當歸四逆湯主之大汗若大下利而厥冷者四逆湯主之觀仲景此論則傷寒三隂必有寒證而宜用溫熱之劑也及讀劉守真之書有曰傷寒邪熱在表腑病為陽邪熱在裏臟病為隂俗妄謂有寒熱隂陽異證誤人久矣寒病有矣非汗病之謂也寒病止為雜病終莫能為汗病且造化汗液之氣者乃陽熱之氣非隂寒之所能也雖仲景有四逆湯證是治表熱裏和誤以寒藥下之太早表熱入裏下利不止及或表熱裏寒自利急以四逆溫裏利止裏和急解其表也故仲景四逆湯證復有承氣湯下之者由是傷寒汗病經直言熱病而不言寒也經言三隂證者邪熱在臟在裏以臟與裏為隂當下熱者也素問論傷寒熱病有二篇名曰熱竟無寒理兼素問并靈樞諸篇運氣造化之理推之則為熱病誠非寒也觀守真此論則傷寒無問在表在裏與夫三陽三隂皆一於為熱而決無或寒者矣兩說不同其是非之判必有一居此者由是彼此反覆究詰其義而久不能得雖至神疲氣耗不舍置者自謂此是傷寒大綱領此義不明則千言萬語皆未足以為後學式況戕賊民生何有窮極也哉意謂成無己之注必有所發明者遂因而求之然亦止是隨文而略釋之竟不明言何由為熱何由為寒之故此非其不欲言也蓋止知傷寒皆是傳經故疑於六經所傳俱為熱證而熱無變寒之理遂不敢别白耳以寒為本臟之寒歟安得當熱邪傳裏入深之時反獨見寒而不見熱者且所用溫熱藥能不助傳經之熱邪乎以寒為外邪之寒歟則在三陽以成熱矣豈有傳至三隂而反為寒哉成氏能潜心乎此則必悟其所以然矣自仲景作傷寒論以來靡或遺之而弗宗至於異同之論興而漁者走淵木者走山矣宜乎後人不能決於似是而非之際故或謂今世並無真傷寒病又或以為今人所得之病俱是內傷又昧者至謂傷寒論中諸溫藥悉為傳經熱邪而用者以三隂經屬隂故也又其大謬者則曰論中凡有寒字皆當作熱字看嗚呼末流之弊一至此乎於是澄心靜慮以涵泳之一旦豁然若有所悟者然亦未敢必其當否也姑陳之以待有道之正夫三陽之病其寒邪之在太陽也寒鬱其陽陽不暢成熱陽雖人身之正氣既鬱則為邪矣用麻黃發表以逐其寒則腠理通而鬱熱泄故汗而愈茍或不汗不解其熱不得外泄則必裏入故傳陽明傳少陽而或入腑也若夫三隂之病則或寒或熱者何哉蓋寒邪之傷人也或有在太陽經鬱熱然後以次而傳至隂經者或有太陽不傳陽明少陽而便傳三隂經者或有寒邪不從陽經而始直傷隂經者或有雖從太陽而始不及鬱熱即入少隂而獨見少隂證者或有始自太陽即入少隂而太陽不能以無傷者或有直傷即入少隂而太陽不能以無傷者或有直傷即入而寒便變熱及始寒而終熱者其鬱熱傳隂與變便變熱則為熱證其直傷隂經及從太陽即入少隂則為寒證其太陽不能無傷則少隂脈證而兼見太陽標病其始為寒而終變熱則先見寒證而後見熱證此三隂之病所以或寒或熱也茍即三隂經篇諸條展轉玩繹以求之理斯出矣夫其或傳經或直傷或即入或先寒後熱者何也邪氣暴卒本無定情而傳變不常故耳故經曰邪之中人也無有常或中於陽或中於隂夫守真者絶類離倫之士也豈好為異說以駭人哉蓋由其以溫暑為傷寒而仲景之方每不與溫暑對故略乎溫熱之劑而例用寒涼由其以傷寒一斷為熱而無寒故謂仲景四逆湯為寒藥誤下表熱裏和之證及為表熱裏寒自利之證而立又謂溫裏止利急解其表又謂寒病止為雜病嗟乎仲景傷寒論專為中而即病之傷寒作不兼為不即病之溫暑作故每有三隂之寒證而溫熱之劑之所以用也以病則寒以時則寒其用之也固宜後人不知此意是以愈求愈逺愈說愈鑿若知此意則猶庖丁解牛動中肯綮矣且如寒藥誤下而成裏寒者固不為不熱矣不因寒藥誤下而自為裏寒者其可謂之必無乎殊不知隂經之每見寒證者本因寒邪不由陽經直傷於此與夫雖由太陽而始不及鬱熱即入於此而致也雖或有因寒藥誤下而致者蓋亦甚少仲景所用諸溫熱之劑何嘗每為寒藥誤下而立況表裏寒之證亦何嘗每有急解其表之文乎夫裏寒外熱之證乃是寒邪入客於內迫陽於外或是虛陽之氣自作外熱之狀耳非真熱邪所為也觀仲景於裏寒外熱之證但以溫藥治裏寒而不治外熱則知其所以為治之意矣若果當急解其表豈不於裏和之後明言之乎且三隂寒病既是雜病何故亦載於傷寒論以惑後人乎其厥隂病篇諸條之上又何故每以傷寒二字冠之乎夫內經所叙三隂病一於為熱者言其常也仲景所叙三隂病兼乎寒熱者言其變也並行而不相悖耳後人謂傷寒本無寒證得非知常而不知變歟然世之恪守局方好用溫熱劑者乃反能每全於寒證無他其守彼雖偏治此則是學者能知三隂固有寒邪所為之證則仲景創法之本意可以了然於心目之間而不為他說所奪矣或曰傷寒之病必從陽經鬱熱而傳三隂今子謂直傷隂經即入隂經而為寒證其何據乎豫曰據夫仲景耳仲景曰病發熱惡寒者發於陽也無熱惡寒者發於隂也發於陽者七日愈發於隂者六日愈夫謂之無熱惡寒則知其非陽經之鬱熱矣謂之發於隂則知其不從陽經傳至此矣謂之六日愈則知其不始太陽而止自隂經發病之日為始數之矣仲景曰傷寒一二日至四五日而厥者必發熱傷寒病厥五日熱亦五日設六日當復厥不厥者自愈傷寒厥四日熱反三日復厥五日其病為進夫得傷寒未為熱即為厥者豈亦由傳經入深之熱邪而致此乎今世人多有始得病時便見諸寒證而並無或熱者此則直傷隂經即入隂經者也茍不能究夫仲景之心但執凡傷於寒則為病熱之語以為治其不夭人天年者幾希矣陽虛隂盛陽盛隂虛論難經曰傷寒陽虛隂盛汗出而愈下之即死陽盛隂虛汗出而死下之而愈嗟乎其傷寒汗下之樞機乎夫邪之傷於人也有淺深焉淺則居表深則入裏居表則暗腠理發怫熱見惡寒惡風頭痛等證於斯時也惟辛溫解散而可愈入裏則為燥屎作潮熱形狂言讝語大渴等證於斯時也惟鹹寒攻下而可平夫寒邪外客非隂盛而陽虛乎熱邪內熾非陽盛而隂虛乎汗下一差生死反掌吁是言也謂之傷寒汗下樞機其不然歟惜乎釋者旁求厥義滋隱外臺祕要曰此隂陽指身之表裏言病者為虛不病者為盛表病裏和是陽虛隂盛也表和裏病是陽盛隂虛也竊意隂陽之在人均則寧偏則病無過不及之謂均過與不及之謂偏盛則過矣虛則不及矣其可以盛為和乎故內經云邪氣盛則實精氣奪則虛且謂陽虛當汗隂虛當下乃遺邪氣而反指正氣為言得無晦乎傷寒微㫖曰此隂陽指脈之尺寸言尺脈實大寸脈短小名隂盛陽虛可汗寸脈實大尺脈短小名陽盛隂虛可下茍汗證已具而脈未應必待尺脈力過於寸而後行下證已具而脈未應必待寸脈力過於尺而後用竊意越人設難以病不以脈其所答也何反以脈不以病乎且脈固以候病也倘汗下之證已急不可稍緩待脈應而不應欲不待則惑於心欲待之則慮其變二者之間將從病歟將從脈歟吾不得無疑於此也或詰豫曰仲景傷寒論引此而繼以桂枝下咽陽盛則斃承氣入胃隂盛以亡之語夫桂枝表藥承氣裏藥反則為害是固然矣然麻黃湯亦表藥也其不言之何歟且子以隂盛為寒邪寒邪固宜用麻黃也今反舉桂枝又何歟豫曰何不味仲景之言乎其曰凡傷寒之病多從風寒得之又曰脈浮而緊浮則為風緊則為寒又桂枝湯條而曰嗇嗇惡寒淅淅惡風麻黃湯條而曰惡風夫風寒分言則風陽而寒隂風茍行於天地嚴凝凛洌之時其得謂之陽乎是則風寒常相因耳故桂枝麻黃皆溫劑也以溫劑為治足以見風寒之俱為隂邪矣但傷衛則桂枝傷榮則麻黃榮衛雖殊其為表則一耳仲景此言但以戒汗下之誤為主不為榮衛設也舉桂枝則麻黃在其中矣所謂陽盛即斃者是言表證已罷而裏證既全可攻而不可汗所謂隂盛以亡者是言裏證未形而表證獨具可汗而不可攻由是觀之則越人仲景之本㫖庶乎惕然於其中矣傷寒三百九十七法辨余自童時習聞此言以為傷寒治法如是之詳且備也及考之成無已注本則所謂三百九十七法者茫然不知所在於是詢諸醫流亦不過熟誦此句而已欲其條分縷析以實其數則未遇其人遂乃反覆而推尋之以有論有方諸條數之則不及其數以有論有方有論無方諸條通數之則過其數除辨脈法平脈法并傷寒例及可汗不可汗可吐不可吐可下不可下諸篇外止以六經病篇中有論有方有論無方諸條數之則亦不及其數以六經病篇及痓濕暍霍亂隂陽易差後勞復病篇中有論有方有論無方諸條數之則亦過其數至以六經病痓濕暍霍亂隂陽易差後勞復篇有論有方諸條數之則又太少矣竟不能決欲以此句視為後人無據之言而不從則疑其或有所據而或出仲景叔和而弗敢廢欲尊信而必從之則又多方求合而莫之遂宋林億等校正傷寒論其序曰今校定張仲景傷寒論十卷總二十篇證外合三百九十七法余於是就其十卷二十二篇而求之其六經篇霍亂篇隂陽易差後勞復篇中有方治諸條以數為計又重載於各篇之前又謂疾病至急倉卒難尋復重集諸可與不可方治分為八篇亦以數為計繼於隂陽易差後勞復篇之後其太陽上篇注曰一十六法太陽中篇注曰六十六法太陽下篇注曰三十九法陽明篇注曰四十四法少陽篇不言法太隂篇注曰三法少隂篇注曰二十三法厥隂篇注曰六法不可發汗篇注曰一法可發汗篇注曰四十一法發汗後篇注曰二十五法可吐篇注曰二法不可下篇注曰四法可下篇注曰四十四法汗吐下後篇注曰四十八法以其所著之數通計之得三百八十七法然少陽篇有小柴胡湯一法其不言者恐脫之也又可吐篇却有五法其止言二法者恐誤也併此脫誤四法於三百九十七法之中亦僅得三百九十一法耳較之序文之說猶缺六法乃參之脈經其可汗可吐等篇外比傷寒論又多可溫可灸可刺可水可火不可刺不可灸不可水不可火諸篇欲以此補其所缺則又甚多而不可用元泰定間程德齊又作傷寒鈐法其自序曰若能精䆒是編則知六經傳變三百九十七法在於指掌矣又曰六經二百一十一法霍亂六法隂陽易差後勞復六法痓濕暍九法不可汗二十六法宜汗四十一法不可吐五法不可下五法可汗五法可吐五法餘亦以其說通計之却止得三百一十八法於三百九十七法中尚缺七十八法觀其序文乃如彼考其所計乃如此則知其猶未能灼然以得其實數而無疑也故下文細數中止重叙六經霍亂痓濕暍隂陽易差後勞復諸法而已彼可汗不可汗等諸法再不重叙也近批㸃傷寒論者何不考其非乃一宗其所銓字號而不敢少易乎余由是屏去其說但即論之本文寢食與俱以紬繹之一旦豁然始悟其所計之數於理不通而非仲景叔和之說矣夫傷寒論仲景之所作也至叔和時已多散落雖叔和搜采成書終不能復其舊然則今之所傳者非全書也明矣後之昧者乃不察此必欲以全書視之為鈐為括斷之曰某經幾證某經幾證以謂傷寒治法略無餘藴矣殊不知其間有論無方者甚多至若前篇引內經所叙六經病證除太陽少隂證為後篇所有外其陽明篇無目疼少陽篇言胸脅滿而不言痛太隂篇無嗌乾厥隂篇無囊縮若此者非皆本無也必有之而脫之耳雖然為鈐括者膠柱調瑟但知叔和之重載而莫知其所以重載之意也夫叔和既撰次於摉采之餘復重載各篇方治并諸可與不可方治者非他不過慮人惑於紛亂故示之以簡便而已林億乃弗解其意遂不問重與不重一槩通數之以立總目何不觀重載八篇之中其方治者止有一十五條為六經篇之所無其餘一百五十三條皆六經篇已數過者安有一法而當兩數之理乎雖程德齊去取與林億頗異然亦五十步笑百步耳其不重數發汗後并吐汗下後諸法固為是矣至於宜汗四十一法却又俱是一法當兩數者與林億所計何以異哉推原其意似亦不見林億所計細數止聞三百九十七法之目遂自就論中尋而數之欲以實其總數然而卒不能實故為此含糊之說以欺後人反又不逮林億所言也竊嘗思之縱使三百七十九法之言不出於林億等而出於億之前亦不足用此言既出則後之聞者必當核其是非以歸於正而乃遵守聽從以為千載不易之定論悲夫余今於三百九十七法內除去重復者與無方治者止以有方治而不重復者計之得二百三十八條并以治字易法字而曰二百三十八治如此則庶或可通也若以法言則仲景一書無非法也豈獨有方者然後為法哉且夫論證論脈與夫諄諄教戒而使人按之以為望聞問切之準則者其可謂之法乎其不可謂之法乎雖然六經之外諸條其二家去取不同固不必辨然其於六經之中尤每有悖理而不通者姑陳一二如太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之桂枝本為解肌若其人脈浮緊發熱汗不出者不可與之也常須識此勿令誤也若酒客病不可與桂枝湯得之則嘔以酒客不喜甘故也喘家作桂枝湯加厚朴杏子佳凡服桂枝湯吐者其後必吐膿血也林億所校本則自太陽病止勿令誤也為一法自若酒客病止杏子佳為一法自凡服桂枝湯止吐膿血也則為證不為法程德齊鈐法則自太陽病止隨證治之為一法自桂枝本為解肌止必吐膿血也為一法又林億本於病脅下素有痞連在臍旁痛引少腹入隂筋者此名臟結死一條則數為一法於其餘死不治者則皆不數程德齊鈐法於陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出愈一條則不數而太陽刺肝俞肺俞期門諸條却又數之而弗遺餘如兩條同類一云當汗而無方一云當汗而有方則取其有方者而略其無方者又如當取而不取不當取而取者蓋亦甚多不可悉舉若此者悖悝不通二家皆所不免所謂楚固失矣齊亦未為得也茍熟玩論之本文以較其言則罅漏出矣醫經溯洄集卷上
